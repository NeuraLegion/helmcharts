simple-service:
  application:
    image: "docker.io/brightsec/juice-shop:latest"
    imagePullPolicy: Always
    port: 3000
    env:
      foo: bar
    resources:
      requests:
        cpu: 400m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /
        port: 3000
        scheme: HTTP
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 1
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /
        port: 3000
        scheme: HTTP
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 1
